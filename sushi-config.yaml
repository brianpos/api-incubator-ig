id: hl7.fhir.uv.api-incubator
canonical: http://hl7.org/fhir/uv/api-incubator
name: API Incubator
title: FHIR R6 API Incubator
description: A guide that details how to capture and exchange API data in FHIR
status: active # draft | active | retired | unknown
version: 0.1.0
fhirVersion: 6.0.0-ballot3
copyrightYear: 2025+
releaseLabel: ci-build
license: CC0-1.0 # https://www.hl7.org/fhir/valueset-spdx-license.html
jurisdiction: http://unstats.un.org/unsd/methods/m49/m49.htm#001 "World" # https://www.hl7.org/fhir/valueset-jurisdiction.html
publisher:
  name: HL7 International / FHIR Infrastructure
  url: http://www.hl7.org/Special/committees/fiwg
extension:
  - url: http://hl7.org/fhir/StructureDefinition/structuredefinition-standards-status
    valueCode: trial-use
  - url: http://hl7.org/fhir/StructureDefinition/structuredefinition-fmm
    valueInteger: 1
  - url: http://hl7.org/fhir/StructureDefinition/structuredefinition-wg
    valueCode: fhir

dependencies:

parameters:
  apply-publisher: true
  apply-contact: true
  globals-in-artifacts: true
  show-inherited-invariants: false
  shownav: false
  path-pages:
    - input/pagecontent
  path-resource: 
    - input/resources/graphdefinition
  special-url-base: http://hl7.org/fhir
  additional-resource: 
    - input/resources/graphdefinition/StructureDefinition-GraphDefinition.xml

pages:
  index.md:
    title: API Incubator
  async-bulk.html:
    title: Asynchronous Bulk Data Request Pattern
    extension: 
      - url: http://hl7.org/fhir/StructureDefinition/structuredefinition-standards-status
        valueCode: trial-use
  async-bundle.html:
    title: Asynchronous Interaction Request Pattern
    extension: 
      - url: http://hl7.org/fhir/StructureDefinition/structuredefinition-standards-status
        valueCode: trial-use
  operations-for-large-resources.html:
    title: Operations for Large Resources (e.g., Groups/Lists)
    extension: 
      - url: http://hl7.org/fhir/StructureDefinition/structuredefinition-standards-status
        valueCode: trial-use
  fhirpath.html:
    title: FHIRPath Extensions for FHIR
    extension: 
      - url: http://hl7.org/fhir/StructureDefinition/structuredefinition-standards-status
        valueCode: trial-use
  changes.md:
    title: Change Log

resources:
  List/GraphDefinition-examples:
    description: A set of GraphDefinition resources that illustrate the use of the $graph operation. These examples are not normative, and are not intended to be used as test cases.
  List/GraphDefinition-operations:
    description: All the GraphDefinition operations available in this guide.

menu:
  Home: index.html
  Specification:
    Asynchronous Interaction Request Pattern: async-bundle.html
    Asynchronous Bulk Data Request Pattern: async-bulk.html
    Operations for Large Resources: operations-for-large-resources.html
    FHIRPath Extensions for FHIR: fhirpath.html
  Artifacts: artifacts.html
  Change Log: changes.html
